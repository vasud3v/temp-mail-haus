name: Discord Latency Test

on:
  workflow_dispatch:

jobs:
  latency:
    runs-on: ubuntu-latest

    steps:
      - name: Show runner location info
        run: |
          echo "Public IP:"
          curl -s https://api.ipify.org
          echo
          echo "Traceroute info:"
          curl -s ipinfo.io

      - name: DNS Resolution Test
        run: |
          echo "=== DNS LOOKUP ==="
          time nslookup discord.com

      - name: Measure Discord API Latency
        run: |
          echo "=== DISCORD API ==="

          curl -o /dev/null -s \
            -w "
          DNS Lookup:      %{time_namelookup}s
          TCP Connect:    %{time_connect}s
          TLS Handshake:  %{time_appconnect}s
          TTFB:           %{time_starttransfer}s
          Total:          %{time_total}s
          HTTP Code:      %{http_code}
          \n" \
          https://discord.com/api/v10

      - name: Multiple Samples
        run: |
          echo "=== 10 SAMPLES ==="

          for i in {1..10}
          do
            echo "Run $i"
            curl -o /dev/null -s \
              -w "Total=%{time_total}s\n" \
              https://discord.com/api/v10
            sleep 1
          done

      - name: Gateway Latency Test
        run: |
          echo "=== DISCORD GATEWAY ==="

          curl -o /dev/null -s \
            -w "
          DNS Lookup:      %{time_namelookup}s
          TCP Connect:    %{time_connect}s
          TLS Handshake:  %{time_appconnect}s
          TTFB:           %{time_starttransfer}s
          Total:          %{time_total}s
          \n" \
          https://gateway.discord.gg
